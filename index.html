<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي الفخم</title>
    <style>
        /* إعدادات الخلفية باستخدام صورتك */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            /* الصورة كخلفية ثابتة مع تعتيم خفيف لتسهيل القراءة */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('99085.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
        }

        /* حاوية الأزرار بتصميم زجاجي شفاف */
        .container {
            width: 85%;
            max-width: 380px;
            text-align: center;
            padding: 50px 25px;
            background: rgba(0, 0, 0, 0.5); /* شفافية سوداء فخمة */
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); /* تأثير الغبش خلف الحاوية */
            -webkit-backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.8rem;
            color: #d4af37; /* اللون الذهبي */
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .bio {
            color: #dddddd;
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        /* تنسيق الأزرار */
        .link-card {
            background: linear-gradient(145deg, #1a1a1a, #050505);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: block;
            text-decoration: none;
            color: #ffffff;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.3s ease-in-out;
        }

        /* تأثير عند تمرير الماوس */
        .link-card:hover {
            background: #d4af37;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.65rem;
            color: #888;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>الملف الشخصي</h1>
        <p class="bio">مرحباً بك في عالمي الخاص</p>

        <a href="https://www.facebook.com/share/15v8jgyX9eG/" class="link-card" target="_blank">فيسبوك</a>
        <a href="https://www.instagram.com/saifeeddine67?igsh=MTI3bWV5bnk0dW1jNg==" class="link-card" target="_blank">إنستغرام</a>
        <a href="https://www.tiktok.com/@ra10126?_r=1&_t=ZS-96HSIOC8fEC" class="link-card" target="_blank">تيك توك</a>

        <div class="footer">PREMIUM EXPERIENCE</div>
    </div>

</body>
</html>

    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي الشخصية | الفخامة</title>
    <style>
        /* إعدادات الخلفية الفخمة */
        body {
            background-color: #050505; /* أسود ملكي */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* حاوية المحتوى */
        .container {
            width: 85%;
            max-width: 400px;
            text-align: center;
            padding: 40px 20px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.8rem;
            color: #d4af37; /* ذهبي */
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        /* تصميم الأزرار الفخمة */
        .link-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* تأثير الحركة عند التمرير */
        .link-card:hover {
            background: #d4af37;
            color: #000;
            transform: scale(1.07);
            border-color: #fff;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }

        /* أيقونة بسيطة قبل النص */
        .link-card::before {
            content: "✦";
            margin-left: 10px;
            font-size: 1.2rem;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>الملف الشخصي</h1>
        <p>مرحباً بك في عالمي الخاص</p>

        <a href="https://www.facebook.com/share/15v8jgyX9eG/" class="link-card" target="_blank">
            فيسبوك
        </a>

        <a href="https://www.instagram.com/saifeeddine67?igsh=MTI3bWV5bnk0dW1jNg==" class="link-card" target="_blank">
            إنستغرام
        </a>

        <a href="https://www.tiktok.com/@ra10126?_r=1&_t=ZS-96HSIOC8fEC" class="link-card" target="_blank">
            تيك توك
        </a>

        <div class="footer">DESIGNED FOR DISTINCTION</div>
    </div>

</body>
</html>

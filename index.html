<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي الفخم</title>
    <style>
        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            text-align: center;
            padding: 40px 20px;
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 1);
            backdrop-filter: blur(15px);
        }

        /* دائرة الصورة الشخصية */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 2px solid #d4af37;
            padding: 4px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        h1 {
            font-size: 1.5rem;
            color: #d4af37;
            margin: 10px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .bio {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .link-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: block;
            text-decoration: none;
            color: #eee;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-weight: 600;
            transition: 0.3s all ease;
        }

        .link-card:hover {
            background: #d4af37;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="صورة الملف" class="profile-img">
        
        <h1>الملف الشخصي</h1>
        <p class="bio">مرحباً بك في عالمي الخاص</p>

        <a href="https://www.facebook.com/share/15v8jgyX9eG/" class="link-card" target="_blank">فيسبوك</a>
        <a href="https://www.instagram.com/saifeeddine67?igsh=MTI3bWV5bnk0dW1jNg==" class="link-card" target="_blank">إنستغرام</a>
        <a href="https://www.tiktok.com/@ra10126?_r=1&_t=ZS-96HSIOC8fEC" class="link-card" target="_blank">تيك توك</a>

        <div class="footer">DESIGNED FOR DISTINCTION</div>
    </div>

</body>
</html>
